<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Campus Lost & Found - Report Lost Item</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="brand">School Lost & Found</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="lost.html" class="active">Report Lost</a>
        <a href="found.html">Report Found</a>
        <a href="claim.html">Claim Item</a>
        <a href="faqs.html">FAQs</a>
        <a href="admin.html">Admin</a>
    </nav>
</header>

<main class="container">

    <!-- REPORT LOST -->
    <section id="lost">
        <div class="card" style="max-width:700px">
            <h2>Report a Lost Item</h2>

            <form id="lostForm">
                <label>Item name</label>
                <input id="lostTitle" required placeholder="e.g. Blue Backpack">

                <label>Where lost</label>
                <input id="lostLocation" required placeholder="e.g. Library - 2nd floor">

                <label>Date lost</label>
                <input id="lostDate" type="date" required>

                <label>Your name</label>
                <input id="lostName" required>

                <label>Contact</label>
                <input id="lostContact" required>

                <label>Details</label>
                <textarea id="lostMessage" rows="4"></textarea>

                <div style="margin-top:12px">
                    <button class="btn" type="submit">Submit Report</button>
                    <button type="button" id="cancelLost" class="btn gray">Cancel</button>
                </div>
            </form>
            <div id="successMessage" style="display:none; color:green; text-align:center; margin-top:20px; font-size:18px;">
                <span style="font-size:24px;">✓</span> Report submitted successfully!
            </div>
        </div>
    </section>

</main>

<footer>
    FBLA Website Design Demo
</footer>

    <script src="js/app.js"></script>

</body>
</html>
