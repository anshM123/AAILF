<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Campus Lost & Found</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="brand">School Lost & Found</div>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="lost.html">Report Lost</a>
        <a href="found.html">Report Found</a>
        <a href="claim.html">Claim Item</a>
        <a href="faqs.html">FAQs</a>
        <a href="admin.html">Admin</a>
    </nav>
</header>

<main class="container">

    <!-- HOME -->
    <section id="home" class="grid">
        <div class="card">
            <h2>Found Items</h2>
            <p class="muted">Browse items currently in the lost & found.</p>
            <div id="itemsList"></div>
        </div>

        <aside class="card">
            <h3>Quick Actions</h3>
            <a href="lost.html" class="btn">Report Lost Item</a>
            <a href="found.html" class="btn">Report Found Item</a>
            <a href="claim.html" class="btn">Claim Item</a>
            <button class="btn" id="refreshBtn" style="margin:16px;">Refresh</button>

            <div style="margin-top:14px">
                <h4>Status</h4>
                <div id="claimStatus" class="muted small">No recent claims.</div>
            </div>
        </aside>
    </section>

</main>

<footer>
    FBLA Website Design Demo
</footer>

    <script src="js/app.js"></script>
