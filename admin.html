<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Campus Lost & Found - Admin</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="brand">School Lost & Found</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="lost.html">Report Lost</a>
        <a href="found.html">Report Found</a>
        <a href="claim.html">Claim Item</a>
        <a href="faqs.html">FAQs</a>
        <a href="admin.html" class="active">Admin</a>
    </nav>
</header>

<main class="container">

    <!-- LOGIN -->
    <section id="login">
        <div class="centered">
            <div class="card">
                <h2>Admin Login</h2>
                <form id="loginForm">
                    <label>Username</label>
                    <input id="adminUser" required>

                    <label>Password</label>
                    <input id="adminPass" type="password" required>

                    <button class="btn" type="submit">Login</button>
                </form>
            </div>
        </div>
    </section>

    <!-- ADMIN -->
    <section id="admin" style="display:none">
        <div class="card">
            <h2>Admin Dashboard</h2>
            <div id="pendingClaims"></div>
            <hr>
            <div id="adminItems"></div>
        </div>
    </section>

</main>

<footer>
    FBLA Website Design Demo
</footer>

    <script src="js/app.js"></script>

</body>
</html>
