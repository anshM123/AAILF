<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Campus Lost & Found - Claim Item</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="brand">School Lost & Found</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="lost.html">Report Lost</a>
        <a href="found.html">Report Found</a>
        <a href="claim.html" class="active">Claim Item</a>
        <a href="faqs.html">FAQs</a>
        <a href="admin.html">Admin</a>
    </nav>
</header>

<main class="container">

    <!-- CLAIM -->
    <section id="claim">
        <div class="centered">
            <div class="card">
                <h2>Claim an Item</h2>

                <form id="claimForm">
                    <label>Item</label>
                    <select id="itemSelect" required></select>

                    <label>Your name</label>
                    <input id="studentName" required>

                    <label>Contact</label>
                    <input id="contact" required>

                    <label>Details</label>
                    <textarea id="message" rows="4"></textarea>

                    <div style="margin-top:12px">
                        <button class="btn" type="submit">Submit Claim</button>
                        <button type="button" id="cancelClaim" class="btn gray">Cancel</button>
                    </div>
                </form>
                <div id="successMessage" style="display:none; color:green; text-align:center; margin-top:20px; font-size:18px;">
                    <span style="font-size:24px;">✓</span> Claim submitted successfully!
                </div>
            </div>
        </div>
    </section>

</main>

    <script src="js/app.js"></script>

</body>
</html>
